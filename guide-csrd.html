            <p class="eyebrow">CSRD guide</p>
            <h2>Double materiality assessment for CSRD reporting: process, ESRS outputs and practical workflow</h2>
            <p>A double materiality assessment is the foundation of CSRD sustainability reporting. It helps a company identify which sustainability matters are material from two perspectives: the company's impacts on people and the environment, and the financial effects of sustainability risks and opportunities on the company.</p>
            <h3>What is double materiality under CSRD?</h3>
            <p>CSRD reporting is built on ESRS. Under this framework, impact materiality and financial materiality are assessed together. A matter can be material from either perspective. That means a topic may need reporting because the company has significant impacts, because the matter creates financial risk or opportunity, or because both perspectives apply.</p>
            <h3>Step 1: Scope the assessment</h3><p>Define reporting entities, business activities, geographic coverage, time horizons and the value chain. A strong scope prevents gaps later when topics are mapped to ESRS disclosures.</p>
            <h3>Step 2: Build the long list of sustainability matters</h3><p>Use ESRS E1-E5, S1-S4 and G1 as the starting universe. Add company-specific topics from strategy, risk registers, complaints, supplier data, customer requirements, regulatory developments and stakeholder engagement.</p>
            <h3>Step 3: Engage stakeholders and collect evidence</h3><p>Stakeholder input can come from interviews, surveys, workshops, employee representatives, supplier assessments, community feedback, investor expectations and customer requirements. Evidence should be traceable and retained for review.</p>
            <h3>Step 4: Assess impact materiality</h3><p>Evaluate scale, scope, irremediability and likelihood for actual and potential impacts. Consider both negative and positive impacts and look beyond direct operations into upstream and downstream value chain activities.</p>
            <h3>Step 5: Assess financial materiality</h3><p>Evaluate magnitude and likelihood of sustainability-related risks and opportunities. Consider revenue, costs, assets, liabilities, financing, insurance, supply continuity, customer demand and regulatory exposure.</p>
            <h3>Step 6: Set thresholds and validate results</h3><p>Thresholds translate scoring into decisions. They should be clear, documented and approved. Review borderline topics carefully and explain why each topic is material, monitored or below threshold.</p>
            <h3>Step 7: Connect material topics to CSRD reporting</h3><p>Material topics should be mapped to ESRS disclosure requirements. For each material matter, prepare policies, actions, targets, metrics, governance responsibilities and time horizons. This is where the assessment becomes the structure of the sustainability statement.</p>
            <h3>Step 8: Prepare report-ready documentation</h3><p>A useful CSRD materiality file should include the matrix, topic register, thresholds, evidence sources, stakeholder inputs, management sign-off and disclosure mapping. This tool supports that documentation by exporting a PDF narrative and an Excel working paper.</p>
            <h3>SEO summary: CSRD double materiality assessment</h3><p>Companies preparing CSRD reporting should use a structured double materiality assessment to identify material sustainability matters, document ESRS-aligned evidence and create a clear basis for the sustainability statement. A good process links stakeholder engagement, impact materiality, financial materiality, value chain analysis and reporting outputs into one auditable workflow.</p>`

            <p>Die doppelte Wesentlichkeitsanalyse ist die Grundlage der CSRD-Nachhaltigkeitsberichterstattung. Sie hilft Unternehmen zu bestimmen, welche Nachhaltigkeitsthemen aus zwei Perspektiven wesentlich sind: Auswirkungen des Unternehmens auf Menschen und Umwelt sowie finanzielle Effekte von Nachhaltigkeitsrisiken und -chancen auf das Unternehmen.</p>
            <h3>Was bedeutet doppelte Wesentlichkeit nach CSRD?</h3><p>CSRD-Reporting basiert auf den ESRS. Impact-Wesentlichkeit und finanzielle Wesentlichkeit werden gemeinsam betrachtet. Ein Thema kann bereits aus einer Perspektive wesentlich sein.</p>
            <h3>Schritt 1: Scope der Analyse festlegen</h3><p>Definiere Berichtseinheiten, Geschaeftsaktivitaeten, geografische Abdeckung, Zeithorizonte und Wertschoepfungskette.</p>
            <h3>Schritt 2: Longlist der Nachhaltigkeitsthemen erstellen</h3><p>Nutze ESRS E1-E5, S1-S4 und G1 als Ausgangsuniversum und ergaenze unternehmensspezifische Themen aus Strategie, Risiko, Beschwerden, Lieferantendaten und Stakeholder-Dialogen.</p>
